user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    server {
        listen 8080;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # NOTE: CORS headers are handled entirely by Laravel's HandleCors middleware
        # (see backend/config/cors.php). Do NOT add CORS headers here too -
        # Nginx's add_header does not replace existing headers, it appends them,
        # which causes "multiple values" CORS errors in the browser.

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # OPTIONS preflight requests are passed through to Laravel (index.php),
        # since Laravel's HandleCors middleware is responsible for answering them
        # with the correct Access-Control-* headers. Do NOT short-circuit OPTIONS
        # here in Nginx, or preflight requests will get a response with no CORS
        # headers at all and the browser will block the real request.
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}