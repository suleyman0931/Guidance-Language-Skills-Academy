user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    server {
        listen 8080;
        server_name _;
        root /var/www/html/public;
        index index.php;

        # CORS headers - adding here as backup for when PHP fails
        # These will be added to ALL responses including errors
        add_header 'Access-Control-Allow-Origin' 'https://guidanceacademy.vercel.app' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Content-Type, X-Requested-With, X-XSRF-TOKEN' always;
        add_header 'Access-Control-Max-Age' '86400' always;

        # Handle OPTIONS requests immediately
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://guidanceacademy.vercel.app' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Content-Type, X-Requested-With, X-XSRF-TOKEN' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' '0';
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            return 204;
        }

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # OPTIONS preflight requests are passed through to Laravel (index.php),
        # since Laravel's HandleCors middleware is responsible for answering them
        # with the correct Access-Control-* headers. Do NOT short-circuit OPTIONS
        # here in Nginx, or preflight requests will get a response with no CORS
        # headers at all and the browser will block the real request.
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}